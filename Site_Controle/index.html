<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Controle Financeiro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Controle Financeiro</div>
      <nav class="nav-menu">
        <a class="nav-link" href="index.html">Dashboard</a>
        <a class="nav-link" href="lancamentos.html">Lançamentos</a>
        <a class="nav-link" href="analise.html">Análise</a>
        <a class="nav-link" href="forecast.html">Forecast</a>
        <a class="nav-link" href="metas.html">Metas</a>
        <a class="nav-link" href="cadastros.html">Cadastros</a>
        <a class="nav-link" href="importar.html">Importação</a>
        <a class="nav-link" href="configuracoes.html">Configurações</a>
      </nav>
    </aside>
    <div class="main-content">
      <header class="page-header">
        <h1>Dashboard</h1>
        <p>Visão geral dos seus ganhos e gastos</p>
      </header>
      <section class="content-area">
        <div class="panel" style="margin-bottom: 1rem; display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
          <label for="periodFilter" style="font-weight:bold;">Período:</label>
          <select id="periodFilter" style="padding: .4rem; border-radius:4px; border:1px solid #ccc;"></select>
          <span id="activePeriodInfo" style="font-size:0.95rem; color:#555;"></span>
        </div>
        <div id="summaryCards"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
          <div class="panel"><h3>Gastos por categoria</h3><canvas id="chartGastosCategoria"></canvas></div>
          <div class="panel"><h3>Evolução mensal</h3><canvas id="chartSaldoEvolucao"></canvas></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
          <div class="panel"><h3>Gastos no mês</h3><canvas id="chartGastosMes"></canvas></div>
          <div class="panel"><h3>Ganhos no mês</h3><canvas id="chartGanhosMes"></canvas></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 1rem;">
          <div class="panel"><h3>Gastos por responsável</h3><canvas id="chartGastosResponsavel"></canvas></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
          <div class="panel"><h3>Lançamentos recentes</h3><div id="ultimosLancamentos"></div></div>
          <div class="panel"><h3>Top 5 gastos</h3><div id="top5Gastos"></div></div>
        </div>
        <div class="panel"><h3>Resumo por categoria</h3><div id="resumoCategoria"></div></div>
      </section>
    </div>
  </div>
  <!-- Bibliotecas e módulos na ordem correta -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
  <!-- Inicialização -->
  <script src="js/app.js"></script>
</body>
</html>
